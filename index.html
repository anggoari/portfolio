<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL CRAFT | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        /* --- CSS RESET & VARIABLES --- */
        :root {
            --bg-dark: #0d0b14;
            --bg-panel: #1a1625;
            --neon-pink: #ff0055;
            --neon-cyan: #00ffcc;
            --neon-yellow: #ffcc00;
            --text-main: #e0e0e0;
            --text-dim: #8888aa;
            --border-width: 4px;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 2rem 1rem;
        }

        /* --- CRT & RETRO EFFECTS --- */
        /* Scanlines */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 999;
        }

        /* Vignette */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 60%, rgba(0, 0, 0, 0.85) 100%);
            pointer-events: none;
            z-index: 998;
        }

        /* Floating Pixels Background */
        .pixel-particle {
            position: fixed;
            width: 6px;
            height: 6px;
            pointer-events: none;
            z-index: 1;
            animation: floatUp linear infinite;
            image-rendering: pixelated;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
        }

        /* --- MAIN CONTAINER --- */
        .container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* --- TYPOGRAPHY --- */
        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 2.5rem;
            color: var(--neon-cyan);
            text-shadow: 
                4px 4px 0 var(--neon-pink),
                8px 8px 0 rgba(0,0,0,0.5);
            line-height: 1.4;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.8rem;
            color: var(--text-dim);
            max-width: 600px;
            line-height: 1.2;
        }

        .terminal {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--text-dim);
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 1.4rem;
            color: var(--neon-yellow);
            width: 100%;
            max-width: 500px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
        }

        .terminal p {
            margin-bottom: 0.5rem;
        }

        .terminal p:last-child {
            margin-bottom: 0;
        }

        .blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* --- COUNTDOWN TIMER --- */
        .countdown-wrapper {
            width: 100%;
        }

        .countdown-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            color: var(--neon-pink);
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .time-box {
            background: var(--bg-panel);
            border: var(--border-width) solid var(--neon-cyan);
            padding: 1rem;
            min-width: 90px;
            box-shadow: 
                4px 4px 0 var(--neon-pink),
                inset 0 0 10px rgba(0, 255, 204, 0.1);
            transition: transform 0.2s;
        }

        .time-box:hover {
            transform: translateY(-4px);
            box-shadow: 
                4px 8px 0 var(--neon-pink),
                inset 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .time-box .number {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8rem;
            color: #fff;
            display: block;
            margin-bottom: 0.5rem;
        }

        .time-box .label {
            font-size: 1.2rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* --- FORM --- */
        .notify-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 500px;
            align-items: center;
        }

        .form-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: var(--neon-yellow);
            margin-bottom: 0.5rem;
        }

        .input-group {
            display: flex;
            width: 100%;
            gap: 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        input[type="email"] {
            flex: 1;
            min-width: 200px;
            background: #000;
            border: var(--border-width) solid var(--neon-cyan);
            border-right: none;
            color: var(--neon-cyan);
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            padding: 0.8rem 1rem;
            outline: none;
            box-shadow: 4px 4px 0 var(--neon-pink);
            appearance: none;
            -webkit-appearance: none;
            border-radius: 0;
        }

        input[type="email"]::placeholder {
            color: rgba(0, 255, 204, 0.4);
        }

        input[type="email"]:focus {
            border-color: var(--neon-yellow);
            color: var(--neon-yellow);
            box-shadow: 4px 4px 0 var(--neon-cyan);
        }

        button {
            background: var(--neon-pink);
            border: var(--border-width) solid #fff;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
            text-transform: uppercase;
            white-space: nowrap;
        }

        button:hover {
            background: #ff3377;
        }

        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0 0 0 #000;
        }

        .form-message {
            font-size: 1.4rem;
            height: 1.5rem;
            color: var(--neon-cyan);
            margin-top: 0.5rem;
        }

        .form-message.error {
            color: var(--neon-pink);
        }

        /* --- SOCIALS --- */
        .socials {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .socials a {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-decoration: none;
            padding: 0.5rem;
            border: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .socials a::before {
            content: "> ";
            color: var(--neon-pink);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .socials a:hover {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
            transform: translateY(-2px);
        }

        .socials a:hover::before {
            opacity: 1;
        }

        /* --- FOOTER --- */
        footer {
            position: relative;
            z-index: 10;
            margin-top: 3rem;
            font-size: 1.2rem;
            color: var(--text-dim);
            text-align: center;
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            html { font-size: 14px; }
            
            h1 {
                font-size: 1.8rem;
                text-shadow: 
                    3px 3px 0 var(--neon-pink),
                    6px 6px 0 rgba(0,0,0,0.5);
            }

            .time-box {
                min-width: 75px;
                padding: 0.8rem;
            }

            .time-box .number {
                font-size: 1.4rem;
            }

            .input-group {
                flex-direction: column;
                align-items: stretch;
            }

            input[type="email"] {
                border-right: var(--border-width) solid var(--neon-cyan);
                border-bottom: none;
                box-shadow: 4px 4px 0 var(--neon-pink);
            }

            input[type="email"]:focus {
                border-right-color: var(--neon-yellow);
            }

            button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            html { font-size: 12px; }
            
            body { padding: 1.5rem 1rem; }

            h1 {
                font-size: 1.4rem;
            }

            .countdown {
                gap: 0.5rem;
            }

            .time-box {
                min-width: 65px;
                padding: 0.6rem;
                border-width: 3px;
            }

            .time-box .number {
                font-size: 1.2rem;
                margin-bottom: 0.2rem;
            }

            .socials {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Main Content -->
    <main class="container">
        <header>
            <h1>@anggoari's <br /> UNTREATED PIXELS</h1>
        </header>

        <p class="subtitle">
            The portfolio is currently rendering...<br>
            Please wait while we forge new 8-bit worlds.
        </p>

        <div class="terminal">
            <p>> INITIALIZING PORTFOLIO...</p>
            <p>> LOADING ASSETS <span class="blink">_</span></p>
        </div>

        <section class="countdown-wrapper">
            <div class="countdown-label">TIME UNTIL LAUNCH</div>
            <div class="countdown" id="countdown">
                <div class="time-box">
                    <span class="number" id="days">00</span>
                    <span class="label">Days</span>
                </div>
                <div class="time-box">
                    <span class="number" id="hours">00</span>
                    <span class="label">Hours</span>
                </div>
                <div class="time-box">
                    <span class="number" id="minutes">00</span>
                    <span class="label">Mins</span>
                </div>
                <div class="time-box">
                    <span class="number" id="seconds">00</span>
                    <span class="label">Secs</span>
                </div>
            </div>
        </section>
		
    </main>

    <footer>
        <p>&copy; 2026 UNTREATED PIXELS. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        // --- COUNTDOWN TIMER ---
        // Set target date to end of the year (or adjust as needed)
        const targetDate = new Date('2026-12-31T23:59:59').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = '<div class="time-box"><span class="number">00</span><span class="label">LAUNCHED!</span></div>';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // --- FLOATING PIXEL PARTICLES ---
        const particleCount = 25;
        const colors = ['#00ffcc', '#ff0055', '#ffcc00', '#ffffff'];

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'pixel-particle';
            
            // Randomize properties
            const size = Math.random() > 0.8 ? 8 : (Math.random() > 0.5 ? 6 : 4);
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particle.style.animationDuration = `${Math.random() * 15 + 10}s`;
            particle.style.animationDelay = `${Math.random() * 10}s`;
            
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
